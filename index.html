<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Rock Paper Scissor</h1>
    <div class="choices">
        <div class="choice" id="rock"><img src="images/rock.png"></div>
        <div class="choice" id="paper"><img src="images/paper.png"></div>
        <div class="choice" id="scissors"><img src="images/scissors.png"></div>
    </div>
    <div class="score-board">
        <div><p id="user-score">0</p>
        <p>YOU</p>
        </div>
        <div>
            <p id="comp-score">0</p>
            <p>COMP</p>
        </div>
    </div>

    <div class="msg-con">
        <h2 id="msg">Make Your Choice</h2>
    </div>
    

<script src="app.js"></script>
</body>
</html>
